name: Auto Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'hooks/**'
      - 'skills/**'
      - 'commands/**'
      - '.opencode/**'
      - '.cursor-plugin/**'
  workflow_dispatch:
    inputs:
      bump_type:
        description: '版本 bump 类型（留空则从 commit 消息自动推断）'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'minor'
          - 'patch'
          - 'major'

permissions:
  contents: write
  pull-requests: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: current-version
        run: |
          VERSION=$(grep '"version"' .claude-plugin/plugin.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: bump-type
        run: |
          # 优先使用手动指定的 bump 类型
          BUMP_TYPE="${{ inputs.bump_type }}"
          if [ -z "$BUMP_TYPE" ]; then
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if echo "$COMMIT_MSG" | grep -qi "BREAKING CHANGE"; then
              BUMP_TYPE="major"
            elif echo "$COMMIT_MSG" | grep -qE "^feat(\(.+\))?:|^feature(\(.+\))?:"; then
              BUMP_TYPE="minor"
            else
              BUMP_TYPE="patch"
            fi
          fi
          echo "type=$BUMP_TYPE" >> $GITHUB_OUTPUT

      - name: Bump version
        id: new-version
        run: |
          CURRENT="${{ steps.current-version.outputs.version }}"
          BUMP_TYPE="${{ steps.bump-type.outputs.type }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case $BUMP_TYPE in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
          esac

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # 更新 .claude-plugin/plugin.json
          jq --arg v "$NEW_VERSION" '.version = $v' .claude-plugin/plugin.json > .claude-plugin/plugin.json.tmp && mv .claude-plugin/plugin.json.tmp .claude-plugin/plugin.json

          # 更新 .claude-plugin/marketplace.json（metadata.version + plugins[0].version）
          jq --arg v "$NEW_VERSION" '.metadata.version = $v | .plugins[0].version = $v' .claude-plugin/marketplace.json > .claude-plugin/marketplace.json.tmp && mv .claude-plugin/marketplace.json.tmp .claude-plugin/marketplace.json

          # 更新 .cursor-plugin/plugin.json
          jq --arg v "$NEW_VERSION" '.version = $v' .cursor-plugin/plugin.json > .cursor-plugin/plugin.json.tmp && mv .cursor-plugin/plugin.json.tmp .cursor-plugin/plugin.json

      - name: Open PR and merge version bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          VERSION="${{ steps.new-version.outputs.version }}"
          BRANCH="chore/version-bump-${VERSION}-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json .cursor-plugin/plugin.json
          git commit -m "chore: bump version to ${VERSION}"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "chore: bump version to ${VERSION}" \
            --body "由 Auto Version Bump workflow 自动创建。将以 squash 合并并附带 [skip ci]，避免再次触发 release workflow。")
          PR_NUM="${PR_URL##*/}"
          # 等待 verify CI 出现并完成（GitHub 需要几秒调度，--watch 在 checks 未出现时会立即返回）
          for i in $(seq 1 12); do
            if gh pr checks "$PR_NUM" 2>/dev/null | grep -q "."; then
              gh pr checks "$PR_NUM" --watch --required && break
              break
            fi
            sleep 5
          done
          gh pr merge "$PR_NUM" --squash \
            --subject "chore: bump version to ${VERSION} [skip ci]" \
            --delete-branch
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Create tag
        run: |
          git tag -a "v${{ steps.new-version.outputs.version }}" -m "Release v${{ steps.new-version.outputs.version }}"
          git push origin "v${{ steps.new-version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new-version.outputs.version }}
          name: v${{ steps.new-version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
